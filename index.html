<meta charset="UTF-8">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Inter, system-ui, sans-serif; background: #070c18; color: #e2e8f0; min-height:100vh; }

  /* Header */
  .header { background: #0a0e1a; border-bottom: 1px solid rgba(20,184,166,0.25); padding: 20px 32px; }
  .header h1 { font-family: Lora, Georgia, serif; color: #fff; font-size: 28px; margin-bottom: 4px; }
  .header p { color: #94a3b8; font-size: 14px; }

  /* Stats Bar */
  .stats-bar { display: flex; gap: 16px; padding: 16px 32px; flex-wrap: wrap; }
  .stat-card { background: #141a2e; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 20px; min-width: 140px; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #2dd4bf; }
  .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .stat-card.warn .num { color: #fcd34d; }
  .stat-card.danger .num { color: #fca5a5; }

  /* Controls */
  .controls { display: flex; gap: 12px; padding: 12px 32px; flex-wrap: wrap; align-items: center; }
  .search-box { background: #141a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 14px; color: #e2e8f0; font-size: 14px; width: 260px; outline: none; }
  .search-box:focus { border-color: #14b8a6; }
  .search-box::placeholder { color: #64748b; }
  select { background: #141a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: #14b8a6; }
  .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-teal { background: #14b8a6; color: #070c18; }
  .btn-teal:hover { background: #2dd4bf; }
  .btn-outline { background: transparent; border: 1px solid rgba(20,184,166,0.4); color: #2dd4bf; }
  .btn-outline:hover { background: rgba(20,184,166,0.12); }
  .btn-red { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
  .btn-red:hover { background: rgba(239,68,68,0.12); }
  .visible-count { color: #94a3b8; font-size: 13px; margin-left: 8px; }

  /* Table */
  .table-wrap { padding: 0 32px 120px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #0f1424; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; position: sticky; top: 0; z-index: 2; border-bottom: 1px solid rgba(20,184,166,0.2); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: #2dd4bf; }
  thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  tbody tr:hover { background: rgba(20,184,166,0.06); }
  tbody tr.selected { background: rgba(20,184,166,0.1); }
  td { padding: 8px 12px; vertical-align: middle; }
  td.num { color: #64748b; text-align: center; width: 40px; }
  td.folder { font-weight: 500; color: #e2e8f0; max-width: 320px; word-break: break-all; }
  td.source { color: #94a3b8; font-size: 12px; }
  td.notes { color: #64748b; font-size: 12px; font-style: italic; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .badge-yes { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
  .badge-no { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .badge-auth { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.35); }
  .badge-full { background: rgba(34,197,94,0.18); color: #4ade80; border: 1px solid rgba(34,197,94,0.45); font-weight:800; }
  .badge-react { background: rgba(56,189,248,0.12); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.25); }
  .badge-html { background: rgba(168,85,247,0.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.25); }
  .badge-node { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .badge-next { background: rgba(20,184,166,0.12); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.25); }
  .badge-unknown { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

  /* Netlify link */
  a.netlify-link { color: #2dd4bf; text-decoration: none; font-size: 12px; }
  a.netlify-link:hover { text-decoration: underline; color: #5eead4; }

  /* Checkbox */
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: #14b8a6; cursor: pointer; }

  /* Bottom Panel */
  .bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #0f1424; border-top: 2px solid rgba(20,184,166,0.35); padding: 12px 32px; display: flex; align-items: center; gap: 16px; z-index: 10; box-shadow: 0 -4px 24px rgba(0,0,0,0.5); }
  .selected-info { color: #2dd4bf; font-weight: 600; font-size: 14px; white-space: nowrap; }
  .selected-list { flex: 1; color: #94a3b8; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { background: #14b8a6; color: #070c18; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .copy-btn:hover { background: #2dd4bf; }
  .copy-btn.copied { background: #22c55e; }

  /* Toast */
  .toast { position: fixed; top: 20px; right: 20px; background: #22c55e; color: #070c18; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Status badges */
  .status-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; transition: all 0.15s; white-space: nowrap; }
  .status-badge:hover { filter: brightness(1.2); transform: scale(1.05); }

  .status-working { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.35); }
  .status-broken  { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.35); }
  .status-needs   { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .status-skip    { background: rgba(100,116,139,0.08); color: #475569; border: 1px solid rgba(100,116,139,0.15); }
</style>

<div class="header">

    <option value="Next.js">Next.js</option>

<div class="table-wrap">

        <th onclick="sortBy('notes')">Notes <span class="sort-arrow" id="sort_notes"></span></th>
        <th onclick="sortBy('status')">Status <span class="sort-arrow" id="sort_status"></span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="bottom-panel">

  <div class="selected-list" id="selectedList">None</div>
  <button class="copy-btn" id="copyBtn" onclick="copySelected()">Copy List</button>
</div>

// Status persistence
const STATUS_KEY = 'firebase_audit_status';
const STATUS_CYCLE = ['unset', 'working', 'broken', 'needs', 'skip'];
const STATUS_LABELS = { unset: '— Not Set', working: '✓ Working', broken: '✗ Broken', needs: '⚙ Needs Setup', skip: '⊘ Skip' };
const STATUS_SORT_ORDER = { working: 0, broken: 1, needs: 2, skip: 3, unset: 4 };

function loadStatuses() {
  try { return JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); } catch { return {}; }
}
function saveStatuses(statuses) {
  localStorage.setItem(STATUS_KEY, JSON.stringify(statuses));
}
function getStatus(folder) {
  return loadStatuses()[folder] || 'unset';
}
function cycleStatus(folder) {
  const statuses = loadStatuses();
  const current = statuses[folder] || 'unset';
  const nextIdx = (STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length;
  statuses[folder] = STATUS_CYCLE[nextIdx];
  saveStatuses(statuses);
  renderTable();
  renderStats();
}

  const next = DATA.filter(d => d.appType === 'Next.js').length;
  const unk = DATA.filter(d => d.appType === 'unknown').length;
  const withUrl = DATA.filter(d => d.netlifyUrl).length;
  const statuses = loadStatuses();
  const working = DATA.filter(d => (statuses[d.folder] || 'unset') === 'working').length;
  const broken  = DATA.filter(d => (statuses[d.folder] || 'unset') === 'broken').length;
  const needs   = DATA.filter(d => (statuses[d.folder] || 'unset') === 'needs').length;
  const fsFullCount = DATA.filter(d => getFirestoreState(d) === 'full').length;
  const fsAuthCount = DATA.filter(d => getFirestoreState(d) === 'auth').length;
  const fsNoneCount = DATA.filter(d => getFirestoreState(d) === 'none').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total Apps</div></div>
    <div style="width:1px;background:rgba(255,255,255,0.08);margin:4px 0"></div>
    <div class="stat-card" style="border-color:rgba(34,197,94,0.45)"><div class="num" style="color:#4ade80">${fsFullCount}</div><div class="label">✓ Full Firebase</div></div>
    <div class="stat-card warn"><div class="num">${fsAuthCount}</div><div class="label">⚠ Auth Only</div></div>
    <div class="stat-card danger"><div class="num">${fsNoneCount}</div><div class="label">✗ No Firebase</div></div>
    <div style="width:1px;background:rgba(255,255,255,0.08);margin:4px 0"></div>
    <div class="stat-card"><div class="num">${react}</div><div class="label">React</div></div>
    <div class="stat-card"><div class="num">${html}</div><div class="label">HTML</div></div>
    <div class="stat-card"><div class="num">${node}</div><div class="label">Node/Other</div></div>
    <div class="stat-card"><div class="num">${next}</div><div class="label">Next.js</div></div>
    <div class="stat-card danger"><div class="num">${unk}</div><div class="label">Unknown</div></div>
    <div class="stat-card"><div class="num">${withUrl}</div><div class="label">Have Netlify URL</div></div>
    <div style="width:1px;background:rgba(255,255,255,0.08);margin:4px 0"></div>
    <div class="stat-card" style="border-color:rgba(34,197,94,0.3)"><div class="num" style="color:#86efac">${working}</div><div class="label">✓ Working</div></div>
    <div class="stat-card" style="border-color:rgba(239,68,68,0.3)"><div class="num" style="color:#fca5a5">${broken}</div><div class="label">✗ Broken</div></div>
    <div class="stat-card" style="border-color:rgba(245,158,11,0.3)"><div class="num" style="color:#fcd34d">${needs}</div><div class="label">⚙ Needs Setup</div></div>
  `;
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const fb = document.getElementById('firebaseFilter').value;
  const fs = document.getElementById('firestoreFilter').value;
  const tp = document.getElementById('typeFilter').value;
  const st = document.getElementById('statusFilter').value;
  const statuses = loadStatuses();

  filtered = DATA.filter(d => {
    if (q && !d.folder.toLowerCase().includes(q)) return false;
    if (fb === 'yes' && !(FIREBASE_OVERRIDE[d.folder] || d.hasFirebase)) return false;
    if (fb === 'no' && (FIREBASE_OVERRIDE[d.folder] || d.hasFirebase)) return false;
    if (fs !== 'all' && getFirestoreState(d) !== fs) return false;
    if (tp !== 'all' && d.appType !== tp) return false;
    if (st !== 'all') {
      const s = statuses[d.folder] || 'unset';
      if (s !== st) return false;
    }
    return true;
  });

  // Sort
  if (sortCol === 'index') {
    if (!sortAsc) filtered = filtered.reverse();
  } else if (sortCol === 'status') {
    filtered.sort((a, b) => {
      const sa = STATUS_SORT_ORDER[statuses[a.folder] || 'unset'];
      const sb = STATUS_SORT_ORDER[statuses[b.folder] || 'unset'];
      return sortAsc ? sa - sb : sb - sa;
    });
  } else {
    filtered.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  let html = '';
  filtered.forEach((d, i) => {
    const idx = DATA.indexOf(d) + 1;
    const checked = selected.has(d.folder) ? 'checked' : '';
    const rowClass = selected.has(d.folder) ? 'selected' : '';
    const fsState = getFirestoreState(d);
    const fbBadge = fsState === 'full'
      ? '<span class="badge badge-full">✓ FULL</span>'
      : fsState === 'auth'
        ? '<span class="badge badge-auth">⚠ AUTH</span>'
        : '<span class="badge badge-no">✗ NO</span>';
    const fsDBBadge = fsState === 'full'
      ? '<span class="badge badge-full">✓ Wired</span>'
      : fsState === 'auth'
        ? '<span class="badge badge-auth">Not wired</span>'
        : '<span style="color:#334155">—</span>';
    const typeBadge = `<span class="badge ${getTypeBadgeClass(d.appType)}">${d.appType}</span>`;
    const netlify = d.netlifyUrl
      ? `<a class="netlify-link" href="${d.netlifyUrl}" target="_blank">${d.netlifyDomain || d.netlifyUrl}</a>`
      : '<span style="color:#334155">—</span>';

    const status = getStatus(d.folder);
    const safeFolder = d.folder.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const statusLabel = STATUS_LABELS[status];
    html += `<tr class="${rowClass}" data-folder="${d.folder}">
      <td><input type="checkbox" ${checked} onchange="toggleRow('${safeFolder}', this)"></td>
      <td class="num">${idx}</td>
      <td class="folder">${d.folder}</td>
      <td>${fbBadge}</td>
      <td>${fsDBBadge}</td>
      <td class="source">${d.firebaseSource || '—'}</td>
      <td>${typeBadge}</td>
      <td>${netlify}</td>
      <td class="notes">${d.notes || ''}</td>
      <td><span class="status-badge status-${status}" onclick="cycleStatus('${safeFolder}')" title="Click to change status">${statusLabel}</span></td>
    </tr>`;
  });
  tbody.innerHTML = html;
  document.getElementById('visibleCount').textContent = `Showing ${filtered.length} of ${DATA.length}`;
  updateBottomPanel();
}

function toggleRow(folder, checkbox) {
  if (checkbox.checked) {
    selected.add(folder);
  } else {
    selected.delete(folder);
  }
  // Update row highlight
  const row = checkbox.closest('tr');
  if (row) row.className = checkbox.checked ? 'selected' : '';
  updateBottomPanel();
}

function toggleHeaderCheck(cb) {
  filtered.forEach(d => {
    if (cb.checked) selected.add(d.folder);
    else selected.delete(d.folder);
  });
  renderTable();
}

function selectVisible() {
  filtered.forEach(d => selected.add(d.folder));
  renderTable();
}

function selectNoFirebase() {
  DATA.filter(d => !d.hasFirebase).forEach(d => selected.add(d.folder));
  renderTable();
}

function clearAll() {
  selected.clear();
  document.getElementById('headerCheck').checked = false;
  renderTable();
}

function updateBottomPanel() {
  const count = selected.size;
  document.getElementById('selectedInfo').textContent = `${count} selected`;
  if (count === 0) {
    document.getElementById('selectedList').textContent = 'None';
  } else {
    const names = [...selected].sort();
    document.getElementById('selectedList').textContent = names.join(', ');
  }
}

function copySelected() {
  if (selected.size === 0) return;
  const text = [...selected].sort().join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      btn.textContent = 'Copy List';
      btn.classList.remove('copied');
      toast.classList.remove('show');
    }, 2000);
  });
}

function sortBy(col) {
  // Clear arrows
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = true;
  }
  const arrow = document.getElementById('sort_' + col);
  if (arrow) arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
  applyFilters();
}

// Event listeners
document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('firebaseFilter').addEventListener('change', applyFilters);
document.getElementById('firestoreFilter').addEventListener('change', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);

// Init
renderStats();
applyFilters();
</script>
</body>
</html>
